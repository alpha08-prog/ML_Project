services:
  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE in the deployment environment}
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      PYTHONUNBUFFERED: "1"
      AUTO_BOOTSTRAP: ${AUTO_BOOTSTRAP:-true}
      PORT: "8000"
    volumes:
      - backend-models:/project/models
      - backend-data:/project/Data

  frontend:
    image: ${FRONTEND_IMAGE:?Set FRONTEND_IMAGE in the deployment environment}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  backend-models:
  backend-data:
