services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend-models:/project/models
      - backend-data:/project/Data
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: frontend/ml
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000

volumes:
  backend-models:
  backend-data:
