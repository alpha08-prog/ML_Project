name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Ruff format check
        run: ruff format --check backend/

      - name: Ruff lint
        run: ruff check backend/

      - name: Mypy type check
        run: mypy backend/ --config-file backend/pyproject.toml

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/ml/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/ml

      - name: ESLint
        run: npm run lint
        working-directory: frontend/ml

      - name: Prettier check
        run: npm run format:check
        working-directory: frontend/ml

      - name: TypeScript type check
        run: npm run type-check
        working-directory: frontend/ml

      - name: Production build
        run: npm run build
        working-directory: frontend/ml

  docker-config:
    name: Compose validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate development compose file
        run: docker compose -f docker-compose.yml config

      - name: Validate production compose file
        env:
          BACKEND_IMAGE: ghcr.io/example/ml-project-backend:latest
          FRONTEND_IMAGE: ghcr.io/example/ml-project-frontend:latest
        run: docker compose -f docker-compose.prod.yml config
