name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish-images:
    name: Build and publish images
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Prepare image names
        id: image-vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            commit_sha="${{ github.event.workflow_run.head_sha }}"
          else
            commit_sha="${{ github.sha }}"
          fi

          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          repo="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=${REGISTRY}/${owner}/${repo}-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${owner}/${repo}-frontend" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-$(echo "$commit_sha" | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.image-vars.outputs.backend_image }}:${{ steps.image-vars.outputs.image_tag }}
            ${{ steps.image-vars.outputs.backend_image }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend/ml
          file: frontend/ml/Dockerfile
          push: true
          tags: |
            ${{ steps.image-vars.outputs.frontend_image }}:${{ steps.image-vars.outputs.image_tag }}
            ${{ steps.image-vars.outputs.frontend_image }}:latest

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: publish-images
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') && secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != '' && secrets.REGISTRY_USERNAME != '' && secrets.REGISTRY_TOKEN != '' }}
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || 'ml-project' }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      FRONTEND_PORT: ${{ vars.FRONTEND_PORT || '80' }}
      AUTO_BOOTSTRAP: ${{ vars.AUTO_BOOTSTRAP || 'true' }}
      REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Prepare image names
        id: image-vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            commit_sha="${{ github.event.workflow_run.head_sha }}"
          else
            commit_sha="${{ github.sha }}"
          fi

          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          repo="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          echo "BACKEND_IMAGE=${REGISTRY}/${owner}/${repo}-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=${REGISTRY}/${owner}/${repo}-frontend" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=sha-$(echo "$commit_sha" | cut -c1-12)" >> "$GITHUB_ENV"
          echo "backend_image=${REGISTRY}/${owner}/${repo}-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${owner}/${repo}-frontend" >> "$GITHUB_OUTPUT"

      - name: Configure SSH access
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Upload compose file
        shell: bash
        run: |
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          scp -P "${DEPLOY_PORT}" docker-compose.prod.yml "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/docker-compose.prod.yml"

      - name: Pull and restart containers
        shell: bash
        run: |
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" <<EOF
          set -euo pipefail
          cat > "${DEPLOY_PATH}/.env" <<ENVVARS
          BACKEND_IMAGE=${BACKEND_IMAGE}:${IMAGE_TAG}
          FRONTEND_IMAGE=${FRONTEND_IMAGE}:${IMAGE_TAG}
          AUTO_BOOTSTRAP=${AUTO_BOOTSTRAP}
          FRONTEND_PORT=${FRONTEND_PORT}
          ENVVARS

          echo "${REGISTRY_TOKEN}" | docker login "${REGISTRY}" -u "${REGISTRY_USERNAME}" --password-stdin
          docker compose -f "${DEPLOY_PATH}/docker-compose.prod.yml" --env-file "${DEPLOY_PATH}/.env" pull
          docker compose -f "${DEPLOY_PATH}/docker-compose.prod.yml" --env-file "${DEPLOY_PATH}/.env" up -d
          EOF
