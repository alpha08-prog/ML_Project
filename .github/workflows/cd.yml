name: CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || vars.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || vars.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          set -euo pipefail
          [ -n "${DEPLOY_SSH_KEY:-}" ] || { echo "::error::DEPLOY_SSH_KEY is empty."; exit 1; }
          [ -n "${DEPLOY_HOST:-}" ] || { echo "::error::DEPLOY_HOST is empty. Set it in repository Secrets (or Variables)."; exit 1; }
          [ -n "${DEPLOY_USER:-}" ] || { echo "::error::DEPLOY_USER is empty. Set it in repository Secrets (or Variables)."; exit 1; }
          [ -n "${DEPLOY_PATH:-}" ] || { echo "::error::DEPLOY_PATH is empty. Set it in repository Secrets (or Variables)."; exit 1; }

      - name: Set up SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 "$DEPLOY_USER@$DEPLOY_HOST" <<EOF
          mkdir -p "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"

          # create env file
          echo "AUTO_BOOTSTRAP=false" > .env
          echo "FRONTEND_PORT=80" >> .env

          # pull latest images and restart
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml down
          docker compose -f docker-compose.prod.yml up -d
          EOF
